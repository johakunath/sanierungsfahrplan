name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: build/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build + smoke test
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e

      - name: Check committed index.html matches fresh build
        working-directory: .
        run: |
          if ! git diff --exit-code -- index.html; then
            echo "::error::Committed index.html is stale — run 'npm run build' from build/ and commit the result"
            exit 1
          fi
